<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Filter for glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="var(--accent)" flood-opacity="var(--glow-opacity)"/>
        </filter>
    </defs>

    <style>
        :root {
            --text-title: #0f172a;
            --text-subtitle: #475569;
            --text-badge: #475569;
            --accent: #2563eb;
            --badge-border: #cbd5e1;
            --glow-opacity: 0.05;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-title: #ffffff;
                --text-subtitle: #94a3b8;
                --text-badge: #64748b;
                --accent: #60a5fa;
                --badge-border: #334155;
                --glow-opacity: 0.25;
            }
        }
        .bg-border {
            stroke: var(--accent);
            stroke-opacity: 0.15;
        }
        .accent-stroke {
            stroke: var(--accent);
        }
        .accent-fill {
            fill: var(--accent);
        }
        .text-title {
            fill: var(--text-title);
        }
        .text-subtitle {
            fill: var(--text-subtitle);
        }
        .text-badge-dev {
            fill: var(--text-title);
        }
        .text-badge-gh {
            fill: var(--text-badge);
        }
        .badge-rect-dev {
            fill: var(--accent);
            fill-opacity: 0.12;
            stroke: var(--accent);
            stroke-opacity: 0.3;
        }
        .badge-rect-gh {
            stroke: var(--badge-border);
        }
        .divider {
            stroke: var(--accent);
        }
    </style>

    <!-- Outer border/frame -->
    <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" class="bg-border" stroke-width="2"/>

    <!-- Centered Visual Icon group -->
    <g transform="translate(330, -80)" filter="url(#glow)">
        <!-- Drawer grids and checkmark transaction -->
        <rect x="140" y="210" width="200" height="180" rx="12" fill="none" class="accent-stroke" stroke-width="8"/>
        <line x1="140" y1="270" x2="340" y2="270" class="accent-stroke" stroke-width="6"/>
        <line x1="140" y1="330" x2="340" y2="330" class="accent-stroke" stroke-width="6"/>
        <line x1="240" y1="210" x2="240" y2="390" class="accent-stroke" stroke-width="6"/>

        <!-- Drawer handles -->
        <circle cx="190" cy="240" r="8" class="accent-fill"/>
        <circle cx="290" cy="240" r="8" class="accent-fill"/>
        <circle cx="190" cy="300" r="8" class="accent-fill"/>
        <circle cx="290" cy="300" r="8" class="accent-fill"/>

        <!-- Successful Checkmark -->
        <path d="M 310 350 L 340 380 L 400 310" fill="none" class="accent-stroke" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Centered information block (Text) -->
    <g transform="translate(600, 360)">
        <!-- Project Title -->
        <text x="0" y="30" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="1.2" class="text-title" text-anchor="middle">COMPONENT LENDING SYSTEM</text>

        <!-- Center-aligned Divider line -->
        <line x1="-200" y1="65" x2="200" y2="65" class="divider" stroke-width="3" stroke-linecap="round"/>

        <!-- Tagline / Subtitle -->
        <text x="0" y="110" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="500" class="text-subtitle" letter-spacing="0.5" text-anchor="middle">Electronic-Component Lending for an Embedded-Systems Lab</text>

        <!-- Technical Domain Badge -->
        <g transform="translate(-187.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" class="badge-rect-dev" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-dev" text-anchor="middle" letter-spacing="1">ACADEMIC ARCHIVE</text>
        </g>

        <!-- GitHub Handle Badge -->
        <g transform="translate(7.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" fill="none" class="badge-rect-gh" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-gh" text-anchor="middle" letter-spacing="1">@mtorun0x7cd</text>
        </g>
    </g>
</svg>

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint and package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP sources
        run: |
          set -e
          for f in $(find src -name '*.php'); do php -l "$f"; done

      - name: Package application
        run: zip -r component-lending-system.zip src sql bilder LICENSE README.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: component-lending-system
          path: component-lending-system.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: component-lending-system

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: component-lending-system.zip
          body: |
            Initial archived release (${{ github.ref_name }}) of Component Lending System, an academic project preserved for reference. See the README for documentation.

            **Full Changelog**: https://github.com/mtorun0x7cd/component-lending-system/commits/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
